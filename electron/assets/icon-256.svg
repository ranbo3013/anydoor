  <!-- 星星装饰 -->
  <circle cx="38.4" cy="64" r="5.12" fill="#fef3c7" opacity="0.8"/>
  <circle cx="217.6" cy="51.2" r="3.84" fill="#fef3c7" opacity="0.6"/>
  <circle cx="25.6" cy="153.6" r="3.072" fill="#fef3c7" opacity="0.5"/>
