<!DOCTYPE html>
<html>

<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>AnyDoor</title>
  <script><%= htmlWebpackPlugin.options.script %></script>
  <script>
    // AnyDoor Desktop: Override Taro's mobile fontSize scaling
    // The Taro fontSize script (40*w/750) is removed by Vite plugin at build time
    // This script ensures the root fontSize stays at 16px (desktop standard)
    (function() {
      // Force 16px root fontSize immediately
      document.documentElement.style.fontSize = '16px';
      
      // Intercept and block any future fontSize changes on <html>
      var _origSet = Object.getOwnPropertyDescriptor(HTMLElement.prototype, 'style') 
        || Object.getOwnPropertyDescriptor(Element.prototype, 'style');
      
      // Continuously force fontSize = 16px
      var _lastFontSize = '16px';
      setInterval(function() {
        if (document.documentElement.style.fontSize !== '16px') {
          document.documentElement.style.fontSize = '16px';
        }
      }, 100);

      // Force all Taro containers to full desktop width/height
      function forceDesktopLayout() {
        document.documentElement.style.fontSize = '16px';
        var els = document.querySelectorAll(
          'html, body, #app, .taro-tabbar__container, .taro-tabbar__panel, ' +
          '.taro_router, .taro-route, .taro_page, [data-page], [data-tabbar-page]'
        );
        els.forEach(function(el) {
          el.style.width = '100%';
          el.style.maxWidth = 'none';
          el.style.minWidth = '0';
          el.style.height = '100%';
          el.style.minHeight = '100%';
          el.style.margin = '0';
          el.style.padding = '0';
        });
      }
      
      window.addEventListener('resize', forceDesktopLayout);
      document.addEventListener('DOMContentLoaded', forceDesktopLayout);
      // Run periodically to catch late Taro style injections
      setInterval(forceDesktopLayout, 300);
    })();
  </script>
</head>

<body>
  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="lab(2.86037 0.455312 0.568903)"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="
        position: fixed;
        inset: 0;
        margin: auto;
        width: 24px;
        height: 24px;
        animation: __app-loading-spin 1s linear infinite;
      ">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <style>
      @keyframes __app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
</body>

</html>
