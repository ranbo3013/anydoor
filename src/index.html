<!DOCTYPE html>
<html>

<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>AnyDoor</title>
  <script><%= htmlWebpackPlugin.options.script %></script>
  <script>
    // Force desktop-standard rem base for AnyDoor desktop app
    // Taro H5 injects a script that sets fontSize = 40*min(w,h)/750 (clamped 20-40px)
    // which makes Tailwind rem units render at 2.5x on desktop.
    // We use MutationObserver to continuously override this back to 16px.
    (function() {
      var html = document.documentElement;
      var TARGET = '16px';
      
      // 1. Intercept addEventListener so Taro's resize handler also gets overridden
      var _origAdd = window.addEventListener;
      window.addEventListener = function(type, fn, opts) {
        if (type === 'resize') {
          var wrapped = function(e) { fn(e); html.style.fontSize = TARGET; };
          return _origAdd.call(window, type, wrapped, opts);
        }
        return _origAdd.apply(window, arguments);
      };
      
      // 2. MutationObserver: any time Taro changes fontSize, force it back
      var observer = new MutationObserver(function() {
        if (html.style.fontSize !== TARGET) {
          html.style.fontSize = TARGET;
        }
      });
      observer.observe(html, { attributes: true, attributeFilter: ['style'] });
      
      // 3. Set immediately + after next tick
      html.style.fontSize = TARGET;
      setTimeout(function() { html.style.fontSize = TARGET; }, 0);
      setTimeout(function() { html.style.fontSize = TARGET; }, 100);
      setTimeout(function() { html.style.fontSize = TARGET; }, 500);
      
      // 4. Also force full width on all Taro containers
      function forceFullWidth() {
        var selectors = ['#app', '.taro-tabbar__container', '.taro-tabbar__panel', '.taro_page', '[data-page]'];
        selectors.forEach(function(sel) {
          var els = document.querySelectorAll(sel);
          els.forEach(function(el) {
            el.style.width = '100%';
            el.style.maxWidth = 'none';
          });
        });
      }
      setTimeout(forceFullWidth, 100);
      setTimeout(forceFullWidth, 500);
      setTimeout(forceFullWidth, 1000);
    })();
  </script>
</head>

<body>
  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="lab(2.86037 0.455312 0.568903)"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="
        position: fixed;
        inset: 0;
        margin: auto;
        width: 24px;
        height: 24px;
        animation: __app-loading-spin 1s linear infinite;
      ">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <style>
      @keyframes __app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
</body>

</html>
