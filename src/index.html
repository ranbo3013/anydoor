<!DOCTYPE html>
<html>

<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>AnyDoor</title>
  <script><%= htmlWebpackPlugin.options.script %></script>
  <script>
    // AnyDoor Desktop: Ensure standard rem base (16px) on resize
    // The Taro fontSize script is removed by Vite plugin at build time,
    // but we still need to handle resize events
    (function() {
      function forceFullWidth() {
        document.documentElement.style.fontSize = '16px';
        var selectors = ['#app', '.taro-tabbar__container', '.taro-tabbar__panel', '.taro_page', '[data-page]'];
        selectors.forEach(function(sel) {
          document.querySelectorAll(sel).forEach(function(el) {
            el.style.width = '100%';
            el.style.maxWidth = 'none';
          });
        });
      }
      window.addEventListener('resize', forceFullWidth);
      document.addEventListener('DOMContentLoaded', function() {
        forceFullWidth();
        setTimeout(forceFullWidth, 100);
        setTimeout(forceFullWidth, 500);
      });
    })();
  </script>
</head>

<body>
  <div id="app">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="lab(2.86037 0.455312 0.568903)"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="
        position: fixed;
        inset: 0;
        margin: auto;
        width: 24px;
        height: 24px;
        animation: __app-loading-spin 1s linear infinite;
      ">
      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
    </svg>
    <style>
      @keyframes __app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>
</body>

</html>
