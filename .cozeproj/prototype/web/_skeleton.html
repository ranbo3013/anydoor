<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（扣子蓝紫风格） === */
      --color-primary:              #4f46e5;
      --color-primary-container:    #e0e7ff;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #f5f5f7;
      --color-surface-container-lowest:   #ffffff;
      --color-surface:                    #ffffff;
      --color-surface-container:          #eef0f3;
      --color-surface-container-high:     #e2e5ea;
      --color-surface-container-highest:  #d5d9e0;
      /* === 侧边栏专用 === */
      --color-sidebar-bg:           #1e1f2e;
      --color-sidebar-hover:        #2a2b3d;
      --color-sidebar-active:       #35364d;
      --color-sidebar-text:         #9ca0b8;
      --color-sidebar-text-active:  #ffffff;
      /* === 文字 === */
      --color-on-surface:           #1a1a2e;
      --color-on-surface-variant:   #6b7280;
      /* === 功能色 === */
      --color-success:  #10b981;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #e5e7eb;
      --color-outline-variant:  #f0f1f3;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-float:  0 4px 16px rgba(0,0,0,0.08);
      --shadow-dialog: 0 20px 40px rgba(0,0,0,0.12);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }

    /* 侧边栏滚动条 */
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* 主内容区滚动条 */
    .main-scroll::-webkit-scrollbar { width: 6px; }
    .main-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans h-screen overflow-hidden">

  <!-- 整体布局：侧边栏 + 主内容 -->
  <div class="flex h-full">

    <!-- @nav:start 导航组件 -->
    <!-- 侧边栏 -->
    <aside class="w-60 bg-sidebar-bg flex flex-col flex-shrink-0 sidebar-scroll overflow-y-auto">
      <!-- Logo 区域 -->
      <div class="px-5 py-5 flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
          <i data-lucide="door-open" class="w-5 h-5 text-on-primary"></i>
        </div>
        <span class="text-sidebar-text-active text-base font-semibold tracking-tight">AnyDoor</span>
      </div>

      <!-- 导航菜单 -->
      <nav class="flex-1 px-3 mt-2 space-y-1">
        <a href="home.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sidebar-text hover:text-sidebar-text-active hover:bg-sidebar-hover transition-colors">
          <i data-lucide="layout-dashboard" class="w-[18px] h-[18px]"></i>
          <span class="text-sm">仪表盘</span>
        </a>
        <a href="providers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sidebar-text hover:text-sidebar-text-active hover:bg-sidebar-hover transition-colors">
          <i data-lucide="server" class="w-[18px] h-[18px]"></i>
          <span class="text-sm">供应商</span>
        </a>
        <a href="routes.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sidebar-text hover:text-sidebar-text-active hover:bg-sidebar-hover transition-colors">
          <i data-lucide="route" class="w-[18px] h-[18px]"></i>
          <span class="text-sm">路由</span>
        </a>
        <a href="logs.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sidebar-text hover:text-sidebar-text-active hover:bg-sidebar-hover transition-colors">
          <i data-lucide="scroll-text" class="w-[18px] h-[18px]"></i>
          <span class="text-sm">请求日志</span>
        </a>
      </nav>

      <!-- 底部状态 -->
      <div class="px-3 pb-4 space-y-1">
        <div class="h-px bg-white/10 my-2"></div>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sidebar-text hover:text-sidebar-text-active hover:bg-sidebar-hover transition-colors">
          <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
          <span class="text-sm">设置</span>
        </a>
        <div class="flex items-center gap-2 px-3 py-2">
          <div class="w-2 h-2 rounded-full bg-success animate-pulse"></div>
          <span class="text-xs text-sidebar-text">网关运行中</span>
        </div>
      </div>
    </aside>
    <!-- @nav:end 导航组件 -->

    <!-- 主内容区 -->
    <main class="flex-1 min-w-0 overflow-y-auto main-scroll">
      <!-- @main-content:start -->
      <!-- @main-content:end -->
    </main>

  </div>

  <script>lucide.createIcons();</script>
</body>

</html>
